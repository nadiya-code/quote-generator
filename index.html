<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quote-verser</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="font-serif">
    <nav class="flex justify-between">
        <div class="mx-2 p-2 text-3xl cursor-pointer">Quote-verser</div>
        <div class="flex justify-around cursor-pointer">
            <a class="mx-2 p-2 text-2xl">Home</a>
            <a class="mx-2  p-2 text-2xl">Explore</a>
            <a class="mx-2 p-2 text-2xl">Authors</a>
            <a class="mx-2 p-2 text-2xl">Saved</a>
            <a class="mx-2 p-2 text-2xl" href="login.html">login</a>
        </div>
    </nav>
    <main>
        <div class="flex items-center justify-center  gap-4 mx-10 p-2 animate-slide-up">
            <span class="w-8 h-px bg-pink-400 opacity-60"></span>
            <p class="uppercase text-pink-400 text-sm tracking-wide cursor-pointer">DAILY WISDOM</p>
            <span class="w-8 h-px bg-pink-400 opacity-60"></span>
        </div>
        <h1 class="text-5xl md:text-6xl font-light leading-[1.1] text-ink max-w-3xl mx-auto text-center animate-slide-up cursor-pointer">
        Words that <span class="italic">illuminate</span><br />
        the human experience
        </h1>
        <p class="text-center text-xl m-3 tracking-wide  animate-slide-up cursor-pointer">Curated quotes from timeless minds</p>
        <div class="flex flex-wrap justify-center items-center gap-4 p-6 text-black mx-auto max-w-2xl">
            <button class="pill pill-active mx-2 p-3 border border-black rounded-[20px]" onclick="filterCategory(this,'all')">All</button>
            <button class="pill p-3 border border-black rounded-[20px]" onclick="filterCategory(this,'philosophy')">Philosophy</button>
            <button class="pill p-3 border border-black rounded-[20px]" onclick="filterCategory(this,'literature')">Literature</button>
            <button class="pill p-3 border border-black rounded-[20px]" onclick="filterCategory(this,'science')">Science</button>
            <button class="pill p-3 border border-black rounded-[20px]" onclick="filterCategory(this,'life')">Life</button>
            <button class="pill p-3 border border-black rounded-[20px]" onclick="filterCategory(this,'courage')">Courage</button>
            <button class="pill p-3 border border-black rounded-[20px]" onclick="filterCategory(this,'creativity')">Creativity</button>
        </div>
        <div  class="flex-col justify-center items-center  mx-auto max-w-2xl" id="quote-card">
            <div class="flex flex-col gap-4">
                <button class="category border p-3 w-fit"></button>
                <p class="quote"></p>
                <span class="flex m-4 justify-center items-center gap-4">
                    <span class="flex-1  h-px bg-pink-400 opacity-60"></span>
                    <span class="bg-pink-400 w-3 h-3 rotate-45"></span>
                    <span class="flex-1  h-px bg-pink-400 opacity-60"></span>
                </span>
                <div class="flex-col m-4">
                    <p class="name inline-flex  items-center justify-center border-2 p-4 rounded-full">L</p>
                    <div class="flex my-3">
                        <span class="flex-1 h-px bg-pink-400 opacity-60"></span>
                    </div>
                </div>
            </div>
            <div class="m-3"></div>
            <div class="flex justify-between items-center m-4">
                <div class="flex items-center gap-4">
                    <button class="border p-3">
                        <a class="flex justify-center items-center gap-4 ">
                            <i class="fa-solid fa-arrows-rotate"></i>
                            <p class="uppercase">New quote</p>
                        </a>
                    </button>
                    <button class="border p-3">
                        <a class="flex justify-center items-center gap-4 ">
                            <i class="fa-regular fa-clone"></i>
                            <p class="uppercase">copy</p>
                        </a>
                    </button>
                </div>
                <div class="flex  items-center gap-4">
                    <button class="border p-3">
                        <a class="flex justify-center items-center gap-4 ">
                            <i class="fa-regular fa-heart"></i>
                            <p class="uppercase">save</p>
                        </a>
                    </button>
                    <button class="border rounded-full p-3">
                        <a class="flex justify-center items-center gap-4 ">                            
                            <i class="fa-solid fa-share-nodes"></i>
                        </a>
                    </button>
                    <button class="border rounded-full p-3">
                        <a class="flex justify-center items-center gap-4 ">                            
                            <i class="fa-solid fa-download"></i>
                        </a>
                    </button>
                </div>
            </div>
        </div>
    </main>
    <script type="module" src="/index.js"></script>   
</body>
</html>
